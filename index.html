<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Table A — Sprint 13</title>
<style>
  :root {
    --bg: #f6f5f2; --bg-table: #fff; --bg-row-alt: #f9f8f6; --bg-header: #e8e6e1;
    --text: #2a2824; --text-dim: #7a7670; --text-mono: #3a3632;
    --border: #ddd9d2; --border-light: #eae7e1; --accent: #2e7d6f;
    --pill-approved-bg: #d6efe9; --pill-approved-fg: #1a5c4e;
    --pill-changes-bg: #fce8c8; --pill-changes-fg: #8a5e10;
    --pill-draft-bg: #dde3f0; --pill-draft-fg: #3b4e78;
    --pill-open-bg: #d6efe9; --pill-open-fg: #1a5c4e;
    --pill-merged-bg: #e2daf0; --pill-merged-fg: #5a3d8a;
    --pill-pinned-bg: #fce8c8; --pill-pinned-fg: #8a5e10;
    --unresolved-bg: #f8dad8; --unresolved-fg: #a03028;
    --report-fg: #1a5c4e; --report-no: #b0aca4;
    --link: #2e7d6f; --shadow: rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181e; --bg-table: #1e2028; --bg-row-alt: #22242c; --bg-header: #282a34;
      --text: #d8d5ce; --text-dim: #8a8680; --text-mono: #c0bbb4;
      --border: #333640; --border-light: #2a2d36; --accent: #4db8a4;
      --pill-approved-bg: #1a3a32; --pill-approved-fg: #6dd4b8;
      --pill-changes-bg: #3a2e18; --pill-changes-fg: #e8c060;
      --pill-draft-bg: #282e40; --pill-draft-fg: #8da0d0;
      --pill-open-bg: #1a3a32; --pill-open-fg: #6dd4b8;
      --pill-merged-bg: #2e2840; --pill-merged-fg: #b8a0e0;
      --pill-pinned-bg: #3a2e18; --pill-pinned-fg: #e8c060;
      --unresolved-bg: #3a2020; --unresolved-fg: #e87870;
      --report-fg: #6dd4b8; --report-no: #55524c;
      --link: #4db8a4; --shadow: rgba(0,0,0,0.25);
    }
  }
  :root[data-theme="dark"] {
    --bg: #16181e; --bg-table: #1e2028; --bg-row-alt: #22242c; --bg-header: #282a34;
    --text: #d8d5ce; --text-dim: #8a8680; --text-mono: #c0bbb4;
    --border: #333640; --border-light: #2a2d36; --accent: #4db8a4;
    --pill-approved-bg: #1a3a32; --pill-approved-fg: #6dd4b8;
    --pill-changes-bg: #3a2e18; --pill-changes-fg: #e8c060;
    --pill-draft-bg: #282e40; --pill-draft-fg: #8da0d0;
    --pill-open-bg: #1a3a32; --pill-open-fg: #6dd4b8;
    --pill-merged-bg: #2e2840; --pill-merged-fg: #b8a0e0;
    --pill-pinned-bg: #3a2e18; --pill-pinned-fg: #e8c060;
    --unresolved-bg: #3a2020; --unresolved-fg: #e87870;
    --report-fg: #6dd4b8; --report-no: #55524c;
    --link: #4db8a4; --shadow: rgba(0,0,0,0.25);
  }
  :root[data-theme="light"] {
    --bg: #f6f5f2; --bg-table: #fff; --bg-row-alt: #f9f8f6; --bg-header: #e8e6e1;
    --text: #2a2824; --text-dim: #7a7670; --text-mono: #3a3632;
    --border: #ddd9d2; --border-light: #eae7e1; --accent: #2e7d6f;
    --pill-approved-bg: #d6efe9; --pill-approved-fg: #1a5c4e;
    --pill-changes-bg: #fce8c8; --pill-changes-fg: #8a5e10;
    --pill-draft-bg: #dde3f0; --pill-draft-fg: #3b4e78;
    --pill-open-bg: #d6efe9; --pill-open-fg: #1a5c4e;
    --pill-merged-bg: #e2daf0; --pill-merged-fg: #5a3d8a;
    --pill-pinned-bg: #fce8c8; --pill-pinned-fg: #8a5e10;
    --unresolved-bg: #f8dad8; --unresolved-fg: #a03028;
    --report-fg: #1a5c4e; --report-no: #b0aca4;
    --link: #2e7d6f; --shadow: rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .page { max-width: 1600px; margin: 0 auto; padding: 24px 20px; }
  .page-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 8px; flex-wrap: wrap; }
  .page-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .page-header .meta { font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .subtitle { font-size: 12px; color: var(--text-dim); margin-bottom: 18px; }
  .stats { display: flex; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .stat-val { font-weight: 700; font-size: 16px; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-val.warn { color: var(--unresolved-fg); }
  .scroll-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 1px 3px var(--shadow); background: var(--bg-table); }
  table { width: 100%; min-width: 1500px; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  thead th { position: sticky; top: 0; z-index: 2; background: var(--bg-header); text-align: left; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); padding: 10px 9px; border-bottom: 2px solid var(--border); white-space: nowrap; }
  thead th:first-child { padding-left: 14px; }
  tbody tr { border-bottom: 1px solid var(--border-light); }
  tbody tr:nth-child(even) { background: var(--bg-row-alt); }
  tbody tr:hover { background: color-mix(in srgb, var(--accent) 6%, var(--bg-table)); }
  td { padding: 8px 9px; vertical-align: middle; font-size: 12.5px; white-space: nowrap; }
  td:first-child { padding-left: 14px; }
  .ticket { font-family: "SF Mono", "Fira Code", ui-monospace, monospace; font-size: 11.5px; font-weight: 600; color: var(--text-mono); }
  .dev { font-size: 11.5px; font-weight: 500; }
  .dev-bien { color: var(--accent); }
  a { color: var(--link); text-decoration: none; font-family: "SF Mono", "Fira Code", ui-monospace, monospace; font-size: 11px; }
  a:hover { text-decoration: underline; }
  .pill { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; line-height: 1.5; }
  .pill-approved { background: var(--pill-approved-bg); color: var(--pill-approved-fg); }
  .pill-changes { background: var(--pill-changes-bg); color: var(--pill-changes-fg); }
  .pill-draft { background: var(--pill-draft-bg); color: var(--pill-draft-fg); }
  .pill-open { background: var(--pill-open-bg); color: var(--pill-open-fg); }
  .pill-merged { background: var(--pill-merged-bg); color: var(--pill-merged-fg); }
  .pill-pinned { background: var(--pill-pinned-bg); color: var(--pill-pinned-fg); }
  .copilot-cell { font-family: "SF Mono", "Fira Code", ui-monospace, monospace; font-size: 11px; }
  .unresolved { display: inline-block; padding: 1px 5px; border-radius: 3px; background: var(--unresolved-bg); color: var(--unresolved-fg); font-weight: 700; font-size: 10.5px; }
  .kanaya-cell { max-width: 230px; overflow: hidden; text-overflow: ellipsis; font-size: 11.5px; }
  .yeucau-cell { font-size: 11.5px; }
  .yeucau-son { color: var(--pill-merged-fg); font-weight: 600; }
  .report-yes { color: var(--report-fg); font-weight: 700; }
  .report-no { color: var(--report-no); }
  .title-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; font-size: 11.5px; }
  .date-cell { font-family: "SF Mono", "Fira Code", ui-monospace, monospace; font-size: 11px; color: var(--text-dim); }
  .footnote { margin-top: 14px; font-size: 11px; color: var(--text-dim); line-height: 1.6; }
  .conflict-cell { font-family: "SF Mono","Fira Code",ui-monospace,monospace; font-size: 10.5px; white-space: nowrap; }
  .cf-bad { color: var(--unresolved-fg); font-weight: 700; }
  .cf-ok { color: var(--report-fg); }
  .cf-na { color: var(--report-no); }
  .cf-unk { color: var(--pill-changes-fg); font-weight: 700; }
  .badge-common { display: inline-block; padding: 1px 5px; border-radius: 3px; background: var(--pill-draft-bg); color: var(--pill-draft-fg); font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; vertical-align: middle; }
  .badge-invalid { display: inline-block; padding: 1px 5px; border-radius: 3px; background: var(--unresolved-bg); color: var(--unresolved-fg); font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; vertical-align: middle; }
</style>
</head>
<body>
<div id="app"></div>
<script id="table-data" type="application/json"></script>
<script>
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function render(D){
  var U=D.prUrlBase, COMMON=new Set(D.common), INVALID=new Set(D.invalidBase);
  function one(p,inv){
    var mark=p.cf==='ok'?'<span class="cf-ok">✓</span>':'<span class="cf-bad">✗</span>';
    var inb=inv?' <span class="badge-invalid" title="ルール違反">invalid</span>':'';
    return '<a href="'+U+p.num+'" target="_blank" rel="noopener">#'+p.num+'</a>'+inb+' <span class="pill pill-open">OPEN</span> '+mark;
  }
  function cell(prs,inv){
    if(!prs||!prs.length) return '<span class="cf-na">—</span>';
    return prs.map(function(p){return one(p,inv);}).join('<br>');
  }
  function unb(n){return n>0?'<span class="unresolved">'+n+'</span>':'0';}
  function cnt(a){return a?a.length:0;}

  // ---- bảng chính ----
  var nbase=0,nr629=0,nr713=0,npr=0,totun=0,ncf=0;
  var rows=D.main.map(function(r){
    var b=r.base||[],r629=r.r629||[],r713=r.r713||[];
    nbase+=cnt(b);nr629+=cnt(r629);nr713+=cnt(r713);npr+=cnt(b)+cnt(r629)+cnt(r713);totun+=r.unres;
    [b,r629,r713].forEach(function(a){a.forEach(function(p){if(p.cf==='bad')ncf++;});});
    var devcls=(r.dev==='bien')?'dev dev-bien':'dev';
    var badge=COMMON.has(r.ticket)?' <span class="badge-common">common</span>':'';
    var rep=r.drive?'<span class="report-yes">✓</span>':'<span class="report-no">—</span>';
    return '<tr>'
      +'<td><span class="ticket">'+r.ticket+'</span>'+badge+'</td>'
      +'<td><span class="'+devcls+'">'+r.dev+'</span></td>'
      +'<td>'+cell(b,INVALID.has(r.ticket))+'</td>'
      +'<td>'+cell(r629,false)+'</td>'
      +'<td>'+cell(r713,false)+'</td>'
      +'<td><span class="date-cell">'+r.created+'</span></td>'
      +'<td><span class="kanaya-cell">—</span></td>'
      +'<td>'+rep+'</td>'
      +'<td><span class="copilot-cell">'+r.cop+'</span></td>'
      +'<td>'+unb(r.unres)+'</td>'
      +'<td><span class="title-cell">'+esc(r.title)+'</span></td>'
    +'</tr>';
  }).join('');

  // ---- bảng phụ scaffold ----
  var scfUn=0,scfCf=0;
  var scfRows=D.scaffold.map(function(r){
    scfUn+=r.unres; if(r.pr.cf==='bad')scfCf++;
    var devcls=(r.dev==='bien')?'dev dev-bien':'dev';
    return '<tr>'
      +'<td><span class="ticket">'+r.ticket+'</span></td>'
      +'<td><span class="'+devcls+'">'+r.dev+'</span></td>'
      +'<td>'+cell([r.pr],false)+'</td>'
      +'<td><span class="date-cell">'+r.created+'</span></td>'
      +'<td><span class="copilot-cell">'+r.cop+'</span></td>'
      +'<td>'+unb(r.unres)+'</td>'
      +'<td><span class="title-cell">'+esc(r.title)+'</span></td>'
    +'</tr>';
  }).join('');

  var html=''
   +'<div class="page">'
   +'<div class="page-header"><h1>Table A — Sprint 13</h1>'
     +'<span class="meta">cập nhật '+D.updated+' · repo '+D.repo+'</span></div>'
   +'<div class="subtitle">Tất cả PR (team-dev Rikkei) tạo từ <b>2026-07-13</b> nhắm vào <b>develop/base</b>, <b>r20260629</b> hoặc <b>r20260713</b> — chỉ cần có PR vào 1 trong 3 nhánh là được tính. Loại PR CLOSED và PR sync/chore/evidence.</div>'
   +'<div class="stats">'
     +'<div class="stat"><span class="stat-val">'+D.main.length+'</span> ticket</div>'
     +'<div class="stat"><span class="stat-val">'+npr+'</span> PR sống</div>'
     +'<div class="stat">→base <span class="stat-val">'+nbase+'</span></div>'
     +'<div class="stat">→r20260629 <span class="stat-val">'+nr629+'</span></div>'
     +'<div class="stat">→r20260713 <span class="stat-val">'+nr713+'</span></div>'
     +'<div class="stat">conflict <span class="stat-val warn">'+ncf+'</span></div>'
     +'<div class="stat">Copilot unresolved <span class="stat-val warn">'+totun+'</span></div>'
   +'</div>'
   +'<div class="scroll-wrap"><table><thead><tr>'
     +'<th>Ticket</th><th>Dev</th><th>→base</th><th>→r20260629</th><th>→r20260713</th>'
     +'<th>Created</th><th>Kanaya</th><th>Report</th><th>Copilot</th><th>Unres.</th><th>Title</th>'
   +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
   +'<h2 style="font-size:15px;font-weight:700;margin:26px 0 4px;letter-spacing:-0.01em;">Bảng phụ — PR → '+D.scaffoldBranch.split('/').pop()+' <span style="font-weight:400;color:var(--text-dim);font-size:12px;">(giàn giáo / bake rule vào SKILL)</span></h2>'
   +'<div class="subtitle">PR trỏ vào nhánh <b>'+D.scaffoldBranch.split('/').pop()+'</b> — cập nhật giàn giáo (rules + frontend-screen-* SKILL). Loại PR sync base/r713→scaffold.</div>'
   +'<div class="stats">'
     +'<div class="stat"><span class="stat-val">'+D.scaffold.length+'</span> PR sống</div>'
     +'<div class="stat">conflict <span class="stat-val warn">'+scfCf+'</span></div>'
     +'<div class="stat">Copilot unresolved <span class="stat-val warn">'+scfUn+'</span></div>'
   +'</div>'
   +'<div class="scroll-wrap"><table style="min-width:1000px;"><thead><tr>'
     +'<th>Ticket</th><th>Dev</th><th>→scaffold</th><th>Created</th><th>Copilot</th><th>Unres.</th><th>Title</th>'
   +'</tr></thead><tbody>'+scfRows+'</tbody></table></div>'
   +'<div class="footnote">Status tất cả = <span class="pill pill-open">OPEN</span>. Kanaya chưa review PR nào.<br>'
     +'Conflict: ✓ MERGEABLE / ✗ CONFLICTING. Report ✓ = có link Drive self-review.<br>'
     +'🔴 Ticket <b>common</b> đếm Copilot chỉ từ PR→base (bỏ r713 cùng code sync).</div>'
   +'</div>';
  document.getElementById('app').innerHTML=html;
}
function fetchData(){
  return fetch('data.json?t='+Date.now()).then(function(r){return r.json();}).then(render)
    .catch(function(e){var a=document.getElementById('app'); if(!a.innerHTML) a.innerHTML='<p style="color:red;padding:20px">Fetch data.json error: '+e+'</p>';});
}
(function(){
  var el=document.getElementById('table-data');
  var txt=el?el.textContent.trim():'';
  if(txt){ try{render(JSON.parse(txt));}catch(e){document.getElementById('app').innerHTML='<p style="color:red;padding:20px">JSON error: '+e+'</p>';} return; }
  fetchData();
  setInterval(fetchData, 300000);  // tự làm mới data mỗi 5 phút (chỉ chế độ fetch/Pages)
})();
document.addEventListener('click',function(e){
  var a=e.target.closest&&e.target.closest('a[href^="http"]');
  if(a){e.preventDefault();window.open(a.href,'_blank','noopener');}
},true);
</script>
</body>
</html>
